<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>TinDog 🐾</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #0F0F14; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useRef } = React;

const PETS = [
  { id:1, name:"Luna", age:2, breed:"Golden Retriever", type:"dog", distance:"2 km", bio:"J'adore jouer à la balle et les balades en forêt 🌲", verified:true, pedigree:true, color:"#F4A261", img:"🐕" },
  { id:2, name:"Milo", age:3, breed:"Bouledogue Français", type:"dog", distance:"5 km", bio:"Champion de siestes et de câlins. Cherche une âme sœur douce.", verified:false, pedigree:true, color:"#E76F51", img:"🐶" },
  { id:3, name:"Nala", age:1, breed:"Siberian Husky", type:"dog", distance:"8 km", bio:"Énergique, joueuse, et un peu sauvage 🐺", verified:true, pedigree:true, color:"#6C91BF", img:"🐺" },
  { id:4, name:"Cléo", age:4, breed:"Chat Persan", type:"cat", distance:"1 km", bio:"Princesse en recherche de compagnie raffinée ✨", verified:true, pedigree:false, color:"#C77DFF", img:"🐱" },
  { id:5, name:"Simba", age:2, breed:"Maine Coon", type:"cat", distance:"3 km", bio:"Grand seigneur cherche partenaire à la hauteur.", verified:false, pedigree:true, color:"#F77F00", img:"🦁" },
  { id:6, name:"Bella", age:5, breed:"Labrador", type:"dog", distance:"4 km", bio:"Maman expérimentée, douce et équilibrée 🌸", verified:true, pedigree:true, color:"#2EC4B6", img:"🐕‍🦺" },
];

const PLANS = [
  { id:"free", name:"Gratuit", price:"0€", period:"", icon:"🐾", color:"#6B7280",
    features:[{text:"Swipe illimité",ok:true},{text:"Messagerie basique",ok:true},{text:"Voir qui vous a liké",ok:false},{text:"Saillie chien de race",ok:false},{text:"Badge Vérifié",ok:false}] },
  { id:"premium", name:"Premium", price:"9,99€", period:"/mois", icon:"💎", color:"#7C3AED", popular:true,
    features:[{text:"Swipe illimité",ok:true},{text:"Messagerie avancée",ok:true},{text:"Voir qui vous a liké ❤️",ok:true},{text:"Saillie chien de race",ok:false},{text:"Badge Vérifié",ok:true}] },
  { id:"breeding", name:"Saillie Pro", price:"24,99€", period:"/mois", icon:"🏆", color:"#D97706",
    features:[{text:"Tout Premium inclus",ok:true},{text:"Annonces saillie illimitées",ok:true},{text:"Filtres race & pedigree",ok:true},{text:"Carnet de santé numérique",ok:true},{text:"Support prioritaire",ok:true}] },
];

const LIKES = [
  { id:101, name:"Rex", breed:"Berger Allemand", img:"🐕", blurred:true },
  { id:102, name:"Lily", breed:"Ragdoll", img:"🐈", blurred:true },
  { id:103, name:"Thor", breed:"Rottweiler", img:"🐶", blurred:true },
  { id:104, name:"Perle", breed:"Bichon Frisé", img:"🐩", blurred:false },
];

function TinDog() {
  const [tab, setTab] = useState("discover");
  const [petIndex, setPetIndex] = useState(0);
  const [swipeDir, setSwipeDir] = useState(null);
  const [match, setMatch] = useState(null);
  const [activePlan, setActivePlan] = useState("free");
  const [filter, setFilter] = useState("all");
  const [showPaywall, setShowPaywall] = useState(false);
  const [paywallType, setPaywallType] = useState("premium");
  const [messages] = useState([
    { id:1, from:"Bella", img:"🐕‍🦺", text:"Woof! Tu veux jouer ?", time:"10:32", unread:true },
    { id:2, from:"Cléo", img:"🐱", text:"Miaou... 👀", time:"09:15", unread:false },
  ]);

  // Touch swipe support
  const touchStartX = useRef(null);

  const handleTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
  const handleTouchEnd = (e) => {
    if (touchStartX.current === null) return;
    const diff = e.changedTouches[0].clientX - touchStartX.current;
    if (Math.abs(diff) > 60) handleSwipe(diff > 0 ? "right" : "left");
    touchStartX.current = null;
  };

  const filteredPets = PETS.filter(p => filter === "all" || p.type === filter);
  const pet = filteredPets[petIndex] || null;

  const handleSwipe = (dir) => {
    if (!pet) return;
    setSwipeDir(dir);
    setTimeout(() => {
      setSwipeDir(null);
      if (dir === "right" && Math.random() > 0.5) {
        setMatch(pet);
      } else {
        setPetIndex(i => i + 1);
      }
    }, 400);
  };

  const closeMatch = () => { setMatch(null); setPetIndex(i => i + 1); };
  const openPaywall = (type) => { setPaywallType(type); setShowPaywall(true); };
  const subscribeTo = (planId) => { setActivePlan(planId); setShowPaywall(false); };

  const isFullscreen = window.innerWidth <= 430;
  const appW = isFullscreen ? window.innerWidth : 390;
  const appH = isFullscreen ? window.innerHeight : 844;

  return (
    <div style={{display:"flex",justifyContent:"center",alignItems:"center",minHeight:"100vh",background:"#0F0F14"}}>
      <div style={{width:appW,height:appH,background:"#16161F",borderRadius:isFullscreen?0:48,overflow:"hidden",position:"relative",boxShadow:"0 40px 120px rgba(0,0,0,0.8)",display:"flex",flexDirection:"column"}}>

        {/* Status bar */}
        <div style={{padding:"12px 24px 0",display:"flex",justifyContent:"space-between",alignItems:"center",color:"white",fontSize:12,fontWeight:600,flexShrink:0}}>
          <span>9:41</span>
          <div style={{width:100,height:24,background:"#1A1A24",borderRadius:20}} />
          <div style={{display:"flex",gap:4}}><span>📶</span><span>🔋</span></div>
        </div>

        {/* Header */}
        <div style={{padding:"8px 24px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{background:"linear-gradient(135deg,#FF6B6B,#FF8E53)",width:36,height:36,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🐾</div>
            <span style={{color:"white",fontSize:22,fontWeight:800,letterSpacing:-0.5}}>Tin<span style={{color:"#FF6B6B"}}>Dog</span></span>
          </div>
          {activePlan === "free" && (
            <button onClick={() => openPaywall("premium")} style={{background:"linear-gradient(135deg,#7C3AED,#9F67FA)",border:"none",borderRadius:20,padding:"6px 14px",color:"white",fontSize:12,fontWeight:700,cursor:"pointer"}}>💎 Premium</button>
          )}
          {activePlan !== "free" && (
            <div style={{background:"#2A2A38",borderRadius:20,padding:"6px 14px",color:"#7C3AED",fontSize:12,fontWeight:700}}>
              {activePlan === "premium" ? "💎 Premium" : "🏆 Saillie Pro"}
            </div>
          )}
        </div>

        {/* Content */}
        <div style={{flex:1,overflow:"hidden",position:"relative"}}>

          {/* ── DISCOVER ── */}
          {tab === "discover" && (
            <div style={{height:"100%",display:"flex",flexDirection:"column",padding:"0 16px"}}>
              {/* Filters */}
              <div style={{display:"flex",gap:8,marginBottom:12,flexShrink:0}}>
                {[["all","🐾 Tous"],["dog","🐕 Chiens"],["cat","🐱 Chats"]].map(([f,label]) => (
                  <button key={f} onClick={() => {setFilter(f);setPetIndex(0);}} style={{background:filter===f?"linear-gradient(135deg,#FF6B6B,#FF8E53)":"#2A2A38",border:"none",borderRadius:20,padding:"6px 16px",color:filter===f?"white":"#888",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                    {label}
                  </button>
                ))}
              </div>

              {pet ? (
                <div style={{flex:1,position:"relative"}}>
                  {/* Card */}
                  <div
                    onTouchStart={handleTouchStart}
                    onTouchEnd={handleTouchEnd}
                    style={{width:"100%",height:"82%",background:`linear-gradient(160deg,${pet.color}33 0%,${pet.color}88 100%)`,borderRadius:28,border:`1px solid ${pet.color}44`,display:"flex",flexDirection:"column",justifyContent:"flex-end",overflow:"hidden",position:"relative",transform:swipeDir==="left"?"rotate(-12deg) translateX(-80px)":swipeDir==="right"?"rotate(12deg) translateX(80px)":"none",transition:"transform 0.35s cubic-bezier(.4,2,.6,1)",boxShadow:`0 20px 60px ${pet.color}30`}}>

                    <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-60%)",fontSize:110,userSelect:"none",filter:"drop-shadow(0 8px 32px rgba(0,0,0,0.3))"}}>{pet.img}</div>

                    <div style={{position:"absolute",top:16,right:16,display:"flex",flexDirection:"column",gap:6}}>
                      {pet.verified && <div style={{background:"rgba(0,0,0,0.5)",backdropFilter:"blur(8px)",borderRadius:12,padding:"4px 10px",color:"#4ADE80",fontSize:11,fontWeight:700}}>✓ Vérifié</div>}
                      {pet.pedigree && <div style={{background:"rgba(0,0,0,0.5)",backdropFilter:"blur(8px)",borderRadius:12,padding:"4px 10px",color:"#FACC15",fontSize:11,fontWeight:700}}>🏅 Pedigree</div>}
                    </div>

                    {swipeDir==="right" && <div style={{position:"absolute",top:32,left:24,border:"3px solid #4ADE80",borderRadius:12,padding:"6px 18px",color:"#4ADE80",fontSize:26,fontWeight:900,transform:"rotate(-15deg)"}}>OUIII 💚</div>}
                    {swipeDir==="left" && <div style={{position:"absolute",top:32,right:24,border:"3px solid #F87171",borderRadius:12,padding:"6px 18px",color:"#F87171",fontSize:26,fontWeight:900,transform:"rotate(15deg)"}}>NON ✗</div>}

                    <div style={{background:"linear-gradient(transparent,rgba(0,0,0,0.85))",padding:"40px 20px 20px"}}>
                      <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:4}}>
                        <span style={{color:"white",fontSize:28,fontWeight:800}}>{pet.name}</span>
                        <span style={{color:"#FF8E53",fontSize:18,fontWeight:600}}>{pet.age} ans</span>
                      </div>
                      <div style={{color:"#CBD5E1",fontSize:14,marginBottom:6}}>🐾 {pet.breed} · 📍 {pet.distance}</div>
                      <p style={{color:"#E2E8F0",fontSize:13,margin:0,lineHeight:1.5}}>{pet.bio}</p>
                    </div>
                  </div>

                  {/* Buttons */}
                  <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:20,paddingTop:14}}>
                    <button onClick={() => handleSwipe("left")} style={{width:60,height:60,borderRadius:30,background:"#2A2A38",border:"2px solid #F87171",fontSize:24,cursor:"pointer",boxShadow:"0 4px 20px rgba(248,113,113,0.2)"}}>✕</button>
                    <button onClick={() => openPaywall("premium")} style={{width:48,height:48,borderRadius:24,background:"#2A2A38",border:"2px solid #FACC15",fontSize:20,cursor:"pointer"}}>⭐</button>
                    <button onClick={() => handleSwipe("right")} style={{width:60,height:60,borderRadius:30,background:"linear-gradient(135deg,#4ADE80,#22D3EE)",border:"none",fontSize:24,cursor:"pointer",boxShadow:"0 4px 20px rgba(74,222,128,0.3)"}}>❤️</button>
                  </div>

                  <p style={{textAlign:"center",color:"#444",fontSize:11,marginTop:8}}>👆 Appuie sur ❤️ / ✕ ou glisse la carte</p>
                </div>
              ) : (
                <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                  <div style={{fontSize:60,marginBottom:12}}>🐾</div>
                  <p style={{color:"#888",textAlign:"center"}}>Plus de profils disponibles.<br/>Revenez plus tard !</p>
                  <button onClick={() => setPetIndex(0)} style={{marginTop:16,background:"linear-gradient(135deg,#FF6B6B,#FF8E53)",border:"none",borderRadius:20,padding:"10px 24px",color:"white",fontWeight:700,cursor:"pointer"}}>Recommencer</button>
                </div>
              )}
            </div>
          )}

          {/* ── LIKES ── */}
          {tab === "likes" && (
            <div style={{height:"100%",overflowY:"auto",padding:"0 16px"}}>
              <h2 style={{color:"white",fontSize:20,fontWeight:800,marginBottom:8}}>❤️ Qui vous a liké</h2>
              {activePlan === "free" && (
                <div style={{background:"linear-gradient(135deg,#7C3AED22,#9F67FA22)",border:"1px solid #7C3AED55",borderRadius:16,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <p style={{color:"#C4B5FD",fontSize:13,margin:0,fontWeight:600}}>💎 Débloquez vos likes</p>
                    <p style={{color:"#888",fontSize:12,margin:"2px 0 0"}}>Passez Premium pour les voir</p>
                  </div>
                  <button onClick={() => openPaywall("premium")} style={{background:"linear-gradient(135deg,#7C3AED,#9F67FA)",border:"none",borderRadius:16,padding:"8px 16px",color:"white",fontSize:13,fontWeight:700,cursor:"pointer"}}>Voir</button>
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                {LIKES.map(l => (
                  <div key={l.id} style={{background:"#2A2A38",borderRadius:20,overflow:"hidden",position:"relative"}}>
                    <div style={{height:120,background:"#3A3A50",display:"flex",alignItems:"center",justifyContent:"center",fontSize:60,filter:(l.blurred && activePlan==="free")?"blur(12px)":"none"}}>{l.img}</div>
                    {l.blurred && activePlan==="free" && (
                      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <div style={{background:"rgba(0,0,0,0.5)",borderRadius:12,padding:"6px 12px",color:"#C4B5FD",fontSize:20}}>🔒</div>
                      </div>
                    )}
                    <div style={{padding:"8px 12px"}}>
                      <p style={{color:"white",margin:0,fontWeight:700,fontSize:14}}>{l.blurred && activePlan==="free" ? "???" : l.name}</p>
                      <p style={{color:"#888",margin:0,fontSize:11}}>{l.breed}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── MESSAGES ── */}
          {tab === "messages" && (
            <div style={{height:"100%",overflowY:"auto",padding:"0 16px"}}>
              <h2 style={{color:"white",fontSize:20,fontWeight:800,marginBottom:16}}>💬 Messages</h2>
              {messages.map(m => (
                <div key={m.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:"#2A2A38",borderRadius:16,marginBottom:10,cursor:"pointer",border:m.unread?"1px solid #FF6B6B44":"1px solid transparent"}}>
                  <div style={{width:50,height:50,borderRadius:25,background:"#3A3A50",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>{m.img}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{color:"white",fontWeight:700,fontSize:15}}>{m.from}</span>
                      <span style={{color:"#555",fontSize:11}}>{m.time}</span>
                    </div>
                    <p style={{color:"#888",fontSize:13,margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.text}</p>
                  </div>
                  {m.unread && <div style={{width:10,height:10,borderRadius:5,background:"#FF6B6B",flexShrink:0}} />}
                </div>
              ))}
            </div>
          )}

          {/* ── ABONNEMENTS ── */}
          {tab === "subscription" && (
            <div style={{height:"100%",overflowY:"auto",padding:"0 16px 16px"}}>
              <h2 style={{color:"white",fontSize:20,fontWeight:800,marginBottom:4}}>🏅 Abonnements</h2>
              <p style={{color:"#888",fontSize:13,marginBottom:16}}>Choisissez le plan de votre compagnon</p>
              {PLANS.map(plan => (
                <div key={plan.id} style={{background:activePlan===plan.id?`linear-gradient(135deg,${plan.color}22,${plan.color}11)`:"#2A2A38",border:`2px solid ${activePlan===plan.id?plan.color:"#3A3A50"}`,borderRadius:20,padding:"16px",marginBottom:12,position:"relative"}}>
                  {plan.popular && <div style={{position:"absolute",top:-10,right:16,background:`linear-gradient(135deg,${plan.color},#C4B5FD)`,borderRadius:10,padding:"3px 12px",color:"white",fontSize:11,fontWeight:800}}>⭐ POPULAIRE</div>}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                        <span style={{fontSize:22}}>{plan.icon}</span>
                        <span style={{color:"white",fontWeight:800,fontSize:17}}>{plan.name}</span>
                      </div>
                      <div style={{display:"flex",alignItems:"baseline",gap:2}}>
                        <span style={{color:plan.color,fontSize:24,fontWeight:900}}>{plan.price}</span>
                        <span style={{color:"#555",fontSize:12}}>{plan.period}</span>
                      </div>
                    </div>
                    {activePlan===plan.id
                      ? <div style={{background:plan.color+"22",border:`1px solid ${plan.color}`,borderRadius:12,padding:"4px 12px",color:plan.color,fontSize:12,fontWeight:700}}>✓ Actif</div>
                      : <button onClick={() => subscribeTo(plan.id)} style={{background:`linear-gradient(135deg,${plan.color},${plan.color}cc)`,border:"none",borderRadius:12,padding:"8px 16px",color:"white",fontSize:13,fontWeight:700,cursor:"pointer"}}>Choisir</button>
                    }
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {plan.features.map((f,i) => (
                      <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:14}}>{f.ok?"✅":"❌"}</span>
                        <span style={{color:f.ok?"#CBD5E1":"#555",fontSize:13}}>{f.text}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Bottom nav */}
        <div style={{display:"flex",justifyContent:"space-around",alignItems:"center",padding:"10px 0 20px",background:"#16161F",borderTop:"1px solid #2A2A38",flexShrink:0}}>
          {[["discover","🐾","Découvrir"],["likes","❤️","Likes"],["messages","💬","Messages"],["subscription","🏅","Plans"]].map(([id,icon,label]) => (
            <button key={id} onClick={() => setTab(id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:"4px 12px"}}>
              <span style={{fontSize:22,opacity:tab===id?1:0.4}}>{icon}</span>
              <span style={{fontSize:10,fontWeight:600,color:tab===id?"#FF6B6B":"#555"}}>{label}</span>
              {tab===id && <div style={{width:4,height:4,borderRadius:2,background:"#FF6B6B"}} />}
            </button>
          ))}
        </div>

        {/* MATCH overlay */}
        {match && (
          <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.92)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:100,padding:32}}>
            <div style={{fontSize:60,marginBottom:8}}>🎉</div>
            <h2 style={{color:"white",fontSize:32,fontWeight:900,margin:"0 0 4px",background:"linear-gradient(135deg,#FF6B6B,#FF8E53)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>C'est un Match !</h2>
            <p style={{color:"#888",textAlign:"center",fontSize:15,marginBottom:24}}>Vous et <strong style={{color:"white"}}>{match.name}</strong> vous vous êtes plu mutuellement 🐾</p>
            <div style={{fontSize:90,marginBottom:24}}>{match.img}</div>
            <div style={{display:"flex",gap:12}}>
              <button onClick={closeMatch} style={{background:"#2A2A38",border:"1px solid #3A3A50",borderRadius:20,padding:"12px 20px",color:"#888",fontWeight:700,cursor:"pointer"}}>Continuer</button>
              <button onClick={() => {closeMatch();setTab("messages");}} style={{background:"linear-gradient(135deg,#FF6B6B,#FF8E53)",border:"none",borderRadius:20,padding:"12px 20px",color:"white",fontWeight:700,cursor:"pointer"}}>💬 Envoyer un message</button>
            </div>
          </div>
        )}

        {/* PAYWALL overlay */}
        {showPaywall && (
          <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.94)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:100,padding:24}}>
            <button onClick={() => setShowPaywall(false)} style={{position:"absolute",top:60,right:20,background:"#2A2A38",border:"none",borderRadius:20,width:36,height:36,color:"#888",fontSize:18,cursor:"pointer"}}>✕</button>
            {paywallType==="premium" ? (
              <>
                <div style={{fontSize:56,marginBottom:12}}>💎</div>
                <h2 style={{color:"white",fontSize:26,fontWeight:900,margin:"0 0 8px",textAlign:"center"}}>TinDog Premium</h2>
                <p style={{color:"#888",textAlign:"center",fontSize:14,marginBottom:24}}>Découvrez tous ceux qui ont flashé sur votre compagnon</p>
                <div style={{width:"100%",background:"#2A2A38",borderRadius:20,padding:20,marginBottom:20}}>
                  {["Voir tous vos likes 👀","Super Likes illimités ⭐","Badge Vérifié ✓","Rewind (annuler un swipe) ↩️"].map((f,i) => (
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                      <div style={{width:8,height:8,borderRadius:4,background:"#7C3AED"}} />
                      <span style={{color:"#CBD5E1",fontSize:14}}>{f}</span>
                    </div>
                  ))}
                </div>
                <button onClick={() => subscribeTo("premium")} style={{width:"100%",background:"linear-gradient(135deg,#7C3AED,#9F67FA)",border:"none",borderRadius:20,padding:"16px",color:"white",fontSize:17,fontWeight:800,cursor:"pointer"}}>S'abonner — 9,99€/mois</button>
              </>
            ) : (
              <>
                <div style={{fontSize:56,marginBottom:12}}>🏆</div>
                <h2 style={{color:"white",fontSize:26,fontWeight:900,margin:"0 0 8px",textAlign:"center"}}>Saillie Pro</h2>
                <p style={{color:"#888",textAlign:"center",fontSize:14,marginBottom:24}}>Pour les éleveurs et passionnés de races pures</p>
                <div style={{width:"100%",background:"#2A2A38",borderRadius:20,padding:20,marginBottom:20}}>
                  {["Annonces saillie illimitées 🐕","Filtre race & LOF/pedigree 📋","Carnet de santé numérique 🏥","Mise en avant des profils ⭐","Support éleveur prioritaire 📞"].map((f,i) => (
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                      <div style={{width:8,height:8,borderRadius:4,background:"#D97706"}} />
                      <span style={{color:"#CBD5E1",fontSize:14}}>{f}</span>
                    </div>
                  ))}
                </div>
                <button onClick={() => subscribeTo("breeding")} style={{width:"100%",background:"linear-gradient(135deg,#D97706,#F59E0B)",border:"none",borderRadius:20,padding:"16px",color:"white",fontSize:17,fontWeight:800,cursor:"pointer"}}>S'abonner — 24,99€/mois</button>
              </>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TinDog />);
</script>
